<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frequently Asked Questions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0524;
    --bg-deep:#050213;
    --cyan:#00f2de;
    --gold:#FFD700;
    --purple:#8b5cf6;
    --purple-deep:#4c2f9e;
    --blue:#2f6fed;
    --panel:#130a30;
    --panel-border:rgba(139,92,246,0.25);
    --text-dim:#a9a0d6;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 10%, rgba(139,92,246,0.18), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(0,242,222,0.10), transparent 45%),
      linear-gradient(180deg, var(--bg-deep), var(--bg));
    font-family:'Space Grotesk', sans-serif;
    color:#e8e4ff;
    min-height:100vh;
  }

  .terminal{
    max-width:1180px;
    margin:0 auto;
    padding:32px 20px 60px;
  }

  .terminal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:28px;
    flex-wrap:wrap;
    gap:14px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }

  .brand-mark{
    width:46px;height:46px;
    border-radius:50%;
    background:conic-gradient(from 180deg, var(--cyan), var(--purple), var(--gold), var(--cyan));
    display:flex;align-items:center;justify-content:center;
    position:relative;
    animation:spin 6s linear infinite;
  }
  .brand-mark::after{
    content:"";
    position:absolute;
    inset:4px;
    border-radius:50%;
    background:var(--bg-deep);
  }
  .brand-mark span{
    position:relative;
    z-index:1;
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:16px;
    color:var(--gold);
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .brand h1{
    font-family:'Orbitron', sans-serif;
    font-weight:700;
    font-size:1.5rem;
    margin:0;
    letter-spacing:1px;
    background:linear-gradient(90deg, var(--cyan), var(--gold));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .brand p{
    margin:2px 0 0;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:0.5px;
  }

  .signal{
    display:flex;
    align-items:flex-end;
    gap:3px;
    height:22px;
  }
  .signal i{
    width:5px;
    background:var(--cyan);
    border-radius:2px;
    display:inline-block;
    animation:pulse 1.2s ease-in-out infinite;
    box-shadow:0 0 8px var(--cyan);
  }
  .signal i:nth-child(1){height:40%; animation-delay:0s;}
  .signal i:nth-child(2){height:65%; animation-delay:0.15s;}
  .signal i:nth-child(3){height:90%; animation-delay:0.3s;}
  .signal i:nth-child(4){height:55%; animation-delay:0.45s;}
  @keyframes pulse{ 0%,100%{opacity:0.35;} 50%{opacity:1;} }

  .layout{
    display:grid;
    grid-template-columns:290px 1fr;
    gap:20px;
    align-items:start;
  }

  @media (max-width: 800px){
    .layout{ grid-template-columns:1fr; }
  }

  .side-panel{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:16px;
    padding:18px 16px;
    max-height:640px;
    overflow-y:auto;
  }
  .side-panel::-webkit-scrollbar{width:6px;}
  .side-panel::-webkit-scrollbar-thumb{background:var(--purple-deep); border-radius:4px;}

  .side-panel h2{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--gold);
    margin:0 0 14px;
    padding-bottom:8px;
    border-bottom:1px dashed var(--panel-border);
  }

  .category{
    margin-bottom:18px;
  }
  .category-label{
    font-size:11px;
    font-family:'JetBrains Mono', monospace;
    color:var(--cyan);
    letter-spacing:1px;
    margin:0 0 8px 2px;
    opacity:0.8;
  }

  .q-box{
    display:block;
    width:100%;
    text-align:left;
    background:rgba(139,92,246,0.08);
    border:1px solid var(--panel-border);
    color:#e8e4ff;
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:8px;
    font-size:12.5px;
    font-family:'Space Grotesk', sans-serif;
    cursor:pointer;
    transition:all 0.2s ease;
    line-height:1.4;
  }
  .q-box:hover{
    background:rgba(0,242,222,0.10);
    border-color:var(--cyan);
    transform:translateX(3px);
  }
  .q-box.asked{
    opacity:0.4;
    border-color:var(--gold);
  }
  .q-box:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:1px;
  }

  .chat-panel{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:16px;
    display:flex;
    flex-direction:column;
    height:640px;
  }

  .chat-head{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 18px;
    border-bottom:1px solid var(--panel-border);
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--text-dim);
  }
  .chat-head .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 8px var(--cyan);
    animation:pulse 1.5s ease-in-out infinite;
  }

  .chat-body{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .chat-body::-webkit-scrollbar{width:6px;}
  .chat-body::-webkit-scrollbar-thumb{background:var(--purple-deep); border-radius:4px;}

  .msg-row{
    display:flex;
    gap:10px;
    max-width:78%;
    animation:rise 0.35s ease;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .msg-row.user{ align-self:flex-end; flex-direction:row-reverse; }
  .msg-row.bot{ align-self:flex-start; }

  .avatar{
    width:30px;height:30px;border-radius:50%;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'Orbitron',sans-serif;
    font-size:11px;
    font-weight:700;
  }
  .avatar.user{ background:rgba(0,242,222,0.15); color:var(--cyan); border:1px solid var(--cyan); }
  .avatar.bot{ background:rgba(255,215,0,0.12); color:var(--gold); border:1px solid var(--gold); }

  .bubble{
    padding:10px 14px;
    border-radius:14px;
    font-size:13.5px;
    line-height:1.6;
  }
  .msg-row.user .bubble{
    background:rgba(0,242,222,0.10);
    border:1px solid rgba(0,242,222,0.35);
    color:#d7fffa;
    border-top-right-radius:4px;
  }
  .msg-row.bot .bubble{
    background:rgba(139,92,246,0.12);
    border:1px solid var(--panel-border);
    color:#eae6ff;
    border-top-left-radius:4px;
  }

  .typing .bubble{
    display:flex;
    gap:4px;
    align-items:center;
    padding:12px 14px;
  }
  .typing .bubble span{
    width:6px;height:6px;border-radius:50%;
    background:var(--gold);
    animation:blink 1.1s infinite;
  }
  .typing .bubble span:nth-child(2){ animation-delay:0.15s; }
  .typing .bubble span:nth-child(3){ animation-delay:0.3s; }
  @keyframes blink{ 0%,80%,100%{opacity:0.2;} 40%{opacity:1;} }

  .chat-foot{
    border-top:1px solid var(--panel-border);
    padding:12px 18px;
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    color:var(--text-dim);
  }
  .chat-foot .blip{
    width:6px;height:6px;background:var(--purple);
    border-radius:50%;
    animation:pulse 1.5s ease-in-out infinite;
  }

  .empty-state{
    margin:auto;
    text-align:center;
    color:var(--text-dim);
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    padding:30px;
  }
  .empty-state .gold{ color:var(--gold); }
</style>
</head>
<body>

<div class="terminal">

  <div class="terminal-header">
    <div class="brand">
      <div class="brand-mark"><span>🪐</span></div>
      <div>
        <h1>Frequently Asked Questions</h1>
        <p>SPACE EXPLORATION QUERY SYSTEM</p>
      </div>
    </div>
    <div class="signal" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
  </div>

  <div class="layout">

    <aside class="side-panel">
      <h2>&gt; Questions</h2>

      <div class="category">
        <p class="category-label">## Auroras</p>
        <button class="q-box" data-q="Do auroras happen in space?" data-a="Auroras form in the upper atmosphere, and astronauts aboard spacecraft and the ISS can sometimes see them from above.">Do auroras happen in space?</button>
        <button class="q-box" data-q="What causes auroras?" data-a="Auroras are created when charged particles from the Sun (solar wind) interact with a planet's magnetic field and atmosphere.">What causes auroras?</button>
        <button class="q-box" data-q="What creates the different colors?" data-a="Different gases produce different colors. Oxygen can create green or red auroras, while nitrogen can produce blue and purple shades.">What creates the different colors?</button>
        <button class="q-box" data-q="At what altitude do auroras occur?" data-a="Most auroras occur between 60 km and 500 km above Earth's surface.">At what altitude do auroras occur?</button>
        <button class="q-box" data-q="Do other planets have auroras?" data-a="Jupiter, Saturn, Mars, and several other planets experience auroras, though they may look very different from Earth's.">Do other planets have auroras?</button>
        <button class="q-box" data-q="Can auroras be seen from space?" data-a="Astronauts often photograph auroras from orbit, where they appear as glowing curtains surrounding the planet.">Can auroras be seen from space?</button>
      </div>

      <div class="category">
        <p class="category-label">## Spaceflight</p>
        <button class="q-box" data-q="How do rockets escape Earth's gravity?" data-a="Rockets generate massive thrust using powerful engines. When the thrust becomes stronger than Earth's gravitational pull, the rocket lifts off and travels into space.">How do rockets escape Earth's gravity?</button>
        <button class="q-box" data-q="Why do astronauts float in space?" data-a="Astronauts float in space not because there is no gravity, but because they are in a constant state of free fall around the Earth, a condition known as microgravity. Both the astronauts and their spacecraft are falling toward Earth at the same rate, allowing them to feel weightless.">Why do astronauts float in space?</button>
        <button class="q-box" data-q="How long does it take to reach Mars?" data-a="A mission to Mars usually takes around 6 to 9 months depending on the spacecraft's speed and the positions of Earth and Mars in their orbits.">How long does it take to reach Mars?</button>
        <button class="q-box" data-q="What do satellites do?" data-a="Satellites help with communication, weather forecasting, GPS navigation, scientific research, and observing Earth from space.">What do satellites do?</button>
      </div>

      <div class="category">
        <p class="category-label">## Astronaut life</p>
        <button class="q-box" data-q="How do astronauts sleep in space?" data-a="Astronauts sleep inside sleeping bags attached to walls or ceilings so they do not float around in zero gravity.">How do astronauts sleep in space?</button>
        <button class="q-box" data-q="How do astronauts shower in space?" data-a="Astronauts do not take regular showers in space. They use rinseless shampoo, wet towels, and small amounts of water for cleaning.">How do astronauts shower in space?</button>
        <button class="q-box" data-q="What do astronauts eat in space?" data-a="Astronauts eat specially prepared food that can survive zero gravity, including dehydrated meals, tortillas, fruits, and packaged snacks.">What do astronauts eat in space?</button>
      </div>

      <div class="category">
        <p class="category-label">## Planets and stars</p>
        <button class="q-box" data-q="How are stars formed?" data-a="Stars form inside massive clouds of gas and dust called nebulae. Gravity pulls the material together until the center becomes hot enough for nuclear fusion to begin.">How are stars formed?</button>
        <button class="q-box" data-q="Why does Earth look blue from space?" data-a="Earth appears blue because most of its surface is covered by oceans, and the atmosphere scatters blue light from the Sun.">Why does Earth look blue from space?</button>
        <button class="q-box" data-q="Why is Mars called the Red Planet?" data-a="Mars appears red because its surface contains iron oxide, also known as rust.">Why is Mars called the Red Planet?</button>
        <button class="q-box" data-q="What is a black hole?" data-a="A black hole is a region in space with gravity so powerful that nothing, not even light, can escape it.">What is a black hole?</button>
        <button class="q-box" data-q="Which planet has the most moons?" data-a="Saturn currently has the highest known number of moons in our solar system.">Which planet has the most moons?</button>
      </div>
    </aside>

    <main class="chat-panel">
      <div class="chat-head">
        <span class="dot"></span>
        FAQs
      </div>

      <div class="chat-body" id="chatBody">
        <div class="empty-state" id="emptyState">
          &gt; select a transmission from the <span class="gold">side panel</span> to begin<br>
          awaiting query...
        </div>
      </div>

      <div class="chat-foot">
        <span class="blip"></span>
        select a question on the left~
      </div>
    </main>

  </div>
</div>

<script>
  const chatBody = document.getElementById('chatBody');
  const emptyState = document.getElementById('emptyState');
  const boxes = document.querySelectorAll('.q-box');

  function scrollDown(){
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function addMessage(role, text){
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    row.innerHTML =
      '<div class="avatar ' + role + '">' + (role === 'user' ? '🚀' : '☄️') + '</div>' +
      '<div class="bubble"></div>';
    row.querySelector('.bubble').textContent = text;
    chatBody.appendChild(row);
    scrollDown();
  }

  function addTyping(){
    const row = document.createElement('div');
    row.className = 'msg-row bot typing';
    row.id = 'typingRow';
    row.innerHTML =
      '<div class="avatar bot">A</div>' +
      '<div class="bubble"><span></span><span></span><span></span></div>';
    chatBody.appendChild(row);
    scrollDown();
  }

  boxes.forEach(function(box){
    box.addEventListener('click', function(){
      if(emptyState) emptyState.remove();

      addMessage('user', box.dataset.q);
      box.classList.add('asked');
      addTyping();

      const answer = box.dataset.a;
      setTimeout(function(){
        const typingRow = document.getElementById('typingRow');
        if(typingRow) typingRow.remove();
        addMessage('bot', answer);
      }, 700 + Math.random() * 500);
    });
  });
</script>

</body>
</html>
