<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060b14;
      --surface: #0d1a2b;
      --accent: #e05c2a;
      --accent2: #f09040;
      --text: #e8e0d0;
      --muted: #7a8898;
      --border: rgba(224, 92, 42, 0.3);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(224,92,42,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(240,144,64,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
      opacity: var(--o, 0.4);
    }

    @keyframes twinkle {
      from { opacity: var(--o, 0.4); }
      to { opacity: calc(var(--o, 0.4) * 0.3); }
    }

    main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }

    header {
      text-align: center;
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 0.75rem;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 1.5rem auto 0;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      width: 100%;
    }

    @media (max-width: 480px) {
      .nav-grid { grid-template-columns: 1fr; }
    }

    .nav-card {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      padding: 1.5rem 1.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s, transform 0.2s;
    }

    .nav-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.25s ease;
    }

    .nav-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(224,92,42,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .nav-card:hover {
      border-color: rgba(224,92,42,0.7);
      transform: translateY(-2px);
    }

    .nav-card:hover::before { transform: scaleY(1); }
    .nav-card:hover::after { opacity: 1; }

    .card-index {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.15em;
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .card-arrow {
      margin-top: 0.75rem;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .nav-card:hover .card-arrow { opacity: 1; }

    footer {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <!-- Stars background -->
  <div class="stars" id="stars"></div>

  <main>
    <header>
      <p class="eyebrow">Mission Control</p>
      <h1>Mars <span>Ares</span><br>Project</h1>
      <p class="subtitle">Select a section to explore</p>
      <div class="divider"></div>
    </header>

    <nav class="nav-grid" aria-label="Project pages">

      <a href="ares.html" class="nav-card">
        <span class="card-index">01</span>
        <span class="card-title">Ares</span>
        <span class="card-desc">Mission overview and objectives</span>
        <span class="card-arrow">ENTER →</span>
      </a>

      <a href="atmosphere.html" class="nav-card">
        <span class="card-index">02</span>
        <span class="card-title">Atmosphere</span>
        <span class="card-desc">Martian atmospheric conditions</span>
        <span class="card-arrow">ENTER →</span>
      </a>

      <a href="rocket.html" class="nav-card">
        <span class="card-index">03</span>
        <span class="card-title">Rocket</span>
        <span class="card-desc">Launch vehicle specifications</span>
        <span class="card-arrow">ENTER →</span>
      </a>

      <a href="faqs.html" class="nav-card">
        <span class="card-index">04</span>
        <span class="card-title">FAQs</span>
        <span class="card-desc">Frequently asked questions</span>
        <span class="card-arrow">ENTER →</span>
      </a>

    </nav>

    <footer>ARES PROJECT &nbsp;·&nbsp; ALL SYSTEMS GO</footer>
  </main>

  <script>
    const stars = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 1.8 + 0.5;
      s.style.cssText = `
        width: ${size}px; height: ${size}px;
        top: ${Math.random() * 100}%;
        left: ${Math.random() * 100}%;
        --o: ${Math.random() * 0.5 + 0.1};
        --d: ${Math.random() * 4 + 2}s;
        animation-delay: ${Math.random() * 4}s;
      `;
      stars.appendChild(s);
    }
  </script>
</body>
</html>
